<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dababati</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #39ff14;
      --green-dim: #1a7a00;
      --green-glow: rgba(57, 255, 20, 0.4);
      --amber: #ffb300;
      --red: #ff2a2a;
      --bg: #050a03;
      --panel: #0b1409;
      --border: #1e3d0f;
      --text: #c8f5b0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Grid background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(57,255,20,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57,255,20,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    /* Title */
    h1 {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(2rem, 6vw, 4rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--green);
      text-shadow:
        0 0 10px var(--green),
        0 0 30px var(--green-glow),
        0 0 60px rgba(57,255,20,0.2);
      animation: flicker 8s infinite;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.85; }
      97% { opacity: 1; }
      98% { opacity: 0.7; }
      99% { opacity: 1; }
    }

    /* Meter panel */
    .meter-panel {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 4px;
      padding: 32px 48px;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(57,255,20,0.1),
        0 0 30px rgba(57,255,20,0.05),
        inset 0 0 40px rgba(0,0,0,0.5);
      min-width: 420px;
    }

    /* Corner decorations */
    .meter-panel::before,
    .meter-panel::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--green);
      border-style: solid;
    }
    .meter-panel::before {
      top: -2px; left: -2px;
      border-width: 3px 0 0 3px;
    }
    .meter-panel::after {
      bottom: -2px; right: -2px;
      border-width: 0 3px 3px 0;
    }

    .meter-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--green-dim);
      text-align: center;
      margin-bottom: 16px;
    }

    /* Big counter display */
    .counter-display {
      font-family: 'Orbitron', monospace;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 700;
      color: var(--green);
      text-align: center;
      letter-spacing: 0.1em;
      text-shadow:
        0 0 10px var(--green),
        0 0 25px var(--green-glow);
      cursor: default;
      user-select: none;
      min-width: 6ch;
      display: block;
      transition: color 0.3s;
    }

    .counter-display.warning { color: var(--amber); text-shadow: 0 0 10px var(--amber), 0 0 25px rgba(255,179,0,0.4); }
    .counter-display.danger  { color: var(--red);  text-shadow: 0 0 10px var(--red),  0 0 25px rgba(255,42,42,0.4); }

    /* Bar meter */
    .bar-container {
      margin-top: 20px;
      width: 100%;
      height: 16px;
      background: rgba(57,255,20,0.08);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green-dim), var(--green));
      transition: width 0.3s ease, background 0.3s;
      border-radius: 2px;
      position: relative;
    }

    .bar-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 4px;
      background: white;
      opacity: 0.6;
      filter: blur(2px);
    }

    .bar-fill.warning { background: linear-gradient(90deg, #7a4400, var(--amber)); }
    .bar-fill.danger  { background: linear-gradient(90deg, #7a0000, var(--red)); }

    /* Tick marks */
    .ticks {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      padding: 0 2px;
    }
    .tick { font-size: 0.55rem; color: var(--green-dim); }

    /* Controls */
    .controls {
      display: flex;
      gap: 16px;
      margin-top: 24px;
      justify-content: center;
    }

    .btn {
      font-family: 'Orbitron', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      width: 56px;
      height: 56px;
      background: transparent;
      border: 2px solid var(--green-dim);
      color: var(--green);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0;
    }

    .btn:hover {
      background: rgba(57,255,20,0.1);
      border-color: var(--green);
      box-shadow: 0 0 12px var(--green-glow);
      transform: translateY(-1px);
    }
    .btn:active { transform: translateY(1px); box-shadow: none; }

    .btn-reset {
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      width: auto;
      padding: 0 18px;
      color: var(--green-dim);
      border-color: #152a09;
    }
    .btn-reset:hover { color: var(--green); border-color: var(--green-dim); box-shadow: none; }

    /* Status line */
    .status-line {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--green-dim);
      text-align: center;
      margin-top: 12px;
      height: 1em;
    }

    /* ===== MERKAVA TANK ===== */
    .tank-track {
      width: 100%;
      overflow: hidden;
      height: 80px;
      position: relative;
    }

    /* Road line */
    .tank-track::after {
      content: '';
      position: absolute;
      bottom: 14px;
      left: 0; right: 0;
      height: 2px;
      background: repeating-linear-gradient(
        90deg,
        var(--green-dim) 0px,
        var(--green-dim) 20px,
        transparent 20px,
        transparent 40px
      );
      opacity: 0.4;
      animation: road-scroll 0.4s linear infinite;
    }

    @keyframes road-scroll {
      from { background-position: 0 0; }
      to   { background-position: -40px 0; }
    }

    .tank {
      position: absolute;
      bottom: 16px;
      left: -160px;
      animation: tank-drive 8s linear infinite;
      filter: drop-shadow(0 0 6px var(--green-glow));
    }

    @keyframes tank-drive {
      0%   { left: -160px; }
      100% { left: calc(100% + 20px); }
    }

    .tank svg {
      width: 140px;
      height: 55px;
    }

    /* Wheel spin */
    .wheel {
      animation: spin 0.4s linear infinite;
      transform-origin: center;
    }
    .wheel2 { animation: spin 0.4s linear infinite; transform-origin: center; }
    .wheel3 { animation: spin 0.4s linear infinite; transform-origin: center; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Exhaust puffs */
    .exhaust {
      position: absolute;
      right: -8px;
      bottom: 28px;
    }
    .puff {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(57,255,20,0.3);
      animation: puff-up 0.8s ease-out infinite;
    }
    .puff:nth-child(2) { animation-delay: 0.27s; }
    .puff:nth-child(3) { animation-delay: 0.54s; }

    @keyframes puff-up {
      0%   { transform: translateY(0) scale(0.5); opacity: 0.5; }
      100% { transform: translateY(-24px) scale(2); opacity: 0; }
    }

    /* Bottom label */
    .bottom-label {
      font-size: 0.55rem;
      letter-spacing: 0.4em;
      color: #0e2208;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dababati</h1>

    <!-- Meter Panel -->
    <div class="meter-panel">
      <div class="meter-label">// UNIT COUNTER — ACTIVE //</div>

      <span class="counter-display" id="counter">000</span>

      <div class="bar-container">
        <div class="bar-fill" id="bar"></div>
      </div>
      <div class="ticks">
        <span class="tick">0</span>
        <span class="tick">250</span>
        <span class="tick">500</span>
        <span class="tick">750</span>
        <span class="tick">999</span>
      </div>

      <div class="controls">
        <button class="btn" id="btn-dec" onclick="change(-1)">−</button>
        <button class="btn" id="btn-inc" onclick="change(1)">+</button>
        <button class="btn btn-reset" onclick="reset()">RESET</button>
      </div>

      <div class="status-line" id="status">STANDBY</div>
    </div>

    <!-- Animated Tank -->
    <div class="tank-track">
      <div class="tank">
        <svg viewBox="0 0 140 55" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Hull body -->
          <rect x="10" y="26" width="110" height="22" rx="3" fill="#1a3d10" stroke="#39ff14" stroke-width="1.2"/>
          <!-- Lower hull skirt -->
          <rect x="14" y="36" width="104" height="10" rx="2" fill="#122a0b" stroke="#2a6018" stroke-width="0.8"/>

          <!-- Turret base -->
          <rect x="40" y="16" width="52" height="16" rx="3" fill="#1e4a12" stroke="#39ff14" stroke-width="1.2"/>

          <!-- Turret top (sloped Merkava shape) -->
          <polygon points="45,16 88,16 84,8 50,8" fill="#234e15" stroke="#39ff14" stroke-width="1"/>

          <!-- Gun barrel — Merkava style (slightly elevated) -->
          <rect x="88" y="9" width="46" height="5" rx="1" fill="#1a3d10" stroke="#39ff14" stroke-width="1"/>
          <!-- Barrel muzzle brake -->
          <rect x="130" y="7" width="8" height="9" rx="1" fill="#1a3d10" stroke="#4aff24" stroke-width="1"/>

          <!-- Rear engine exhaust (Merkava engine in front, exhaust rear) -->
          <rect x="8" y="28" width="8" height="12" rx="1" fill="#122a0b" stroke="#2a6018" stroke-width="0.8"/>

          <!-- Commander's cupola -->
          <circle cx="58" cy="10" r="4" fill="#1e4a12" stroke="#39ff14" stroke-width="0.8"/>
          <rect x="56" y="5" width="4" height="6" rx="0.5" fill="#1e4a12" stroke="#39ff14" stroke-width="0.8"/>

          <!-- Track (top) -->
          <rect x="12" y="38" width="104" height="4" rx="1" fill="#0e1f08"/>

          <!-- Wheels — using groups with transform-origin workaround -->
          <!-- Wheel 1 -->
          <g id="w1">
            <circle cx="26" cy="44" r="7" fill="#0e1f08" stroke="#39ff14" stroke-width="1.2"/>
            <circle cx="26" cy="44" r="3" fill="#1a3d10" stroke="#39ff14" stroke-width="0.8"/>
            <line x1="26" y1="37" x2="26" y2="51" stroke="#39ff14" stroke-width="0.6" id="ws1"/>
            <line x1="19" y1="44" x2="33" y2="44" stroke="#39ff14" stroke-width="0.6"/>
          </g>
          <!-- Wheel 2 -->
          <g id="w2">
            <circle cx="54" cy="44" r="7" fill="#0e1f08" stroke="#39ff14" stroke-width="1.2"/>
            <circle cx="54" cy="44" r="3" fill="#1a3d10" stroke="#39ff14" stroke-width="0.8"/>
            <line x1="54" y1="37" x2="54" y2="51" stroke="#39ff14" stroke-width="0.6"/>
            <line x1="47" y1="44" x2="61" y2="44" stroke="#39ff14" stroke-width="0.6"/>
          </g>
          <!-- Wheel 3 -->
          <g id="w3">
            <circle cx="82" cy="44" r="7" fill="#0e1f08" stroke="#39ff14" stroke-width="1.2"/>
            <circle cx="82" cy="44" r="3" fill="#1a3d10" stroke="#39ff14" stroke-width="0.8"/>
            <line x1="82" y1="37" x2="82" y2="51" stroke="#39ff14" stroke-width="0.6"/>
            <line x1="75" y1="44" x2="89" y2="44" stroke="#39ff14" stroke-width="0.6"/>
          </g>
          <!-- Wheel 4 (drive sprocket) -->
          <g id="w4">
            <circle cx="108" cy="44" r="7" fill="#0e1f08" stroke="#39ff14" stroke-width="1.2"/>
            <circle cx="108" cy="44" r="3" fill="#1a3d10" stroke="#39ff14" stroke-width="0.8"/>
            <line x1="108" y1="37" x2="108" y2="51" stroke="#39ff14" stroke-width="0.6"/>
            <line x1="101" y1="44" x2="115" y2="44" stroke="#39ff14" stroke-width="0.6"/>
          </g>

          <!-- Track links (animated via JS) -->
          <rect id="track-links" x="12" y="50" width="104" height="4" rx="1" fill="#0e1f08" stroke="#1e3d0f" stroke-width="0.5"/>

          <!-- Star of David marking -->
          <text x="60" y="34" font-size="9" fill="#39ff14" opacity="0.5" font-family="serif">✡</text>
        </svg>

        <!-- Exhaust puffs from rear -->
        <div class="exhaust" style="right:auto;left:-12px;bottom:28px;">
          <div class="puff"></div>
          <div class="puff"></div>
          <div class="puff"></div>
        </div>
      </div>
    </div>

    <div class="bottom-label">דבבתי // MBT MERKAVA IV // IDF ARMORED CORPS</div>
  </div>

  <script>
    let count = 0;
    const MAX = 999;

    const counterEl = document.getElementById('counter');
    const barEl     = document.getElementById('bar');
    const statusEl  = document.getElementById('status');

    const statuses = [
      'STANDBY', 'ARMED', 'ENGAGING TARGET', 'ADVANCING', 'HOLDING POSITION',
      'FIRE SUPPORT ACTIVE', 'RELOADING', 'MOVING TO FLANK'
    ];

    function pad(n) { return String(n).padStart(3, '0'); }

    function getClass(n) {
      if (n >= 750) return 'danger';
      if (n >= 500) return 'warning';
      return '';
    }

    function update() {
      counterEl.textContent = pad(count);
      const cls = getClass(count);
      counterEl.className = 'counter-display ' + cls;
      barEl.className = 'bar-fill ' + cls;
      barEl.style.width = (count / MAX * 100) + '%';
    }

    function change(delta) {
      count = Math.max(0, Math.min(MAX, count + delta));
      const msgs = statuses;
      statusEl.textContent = msgs[Math.floor(Math.random() * msgs.length)];
      update();

      // flash effect
      counterEl.style.opacity = '0.4';
      setTimeout(() => counterEl.style.opacity = '1', 80);
    }

    function reset() {
      count = 0;
      statusEl.textContent = 'STANDBY';
      update();
    }

    // Wheel rotation animation via JS (rotate SVG groups around their center)
    let angle = 0;
    const wheels = [
      { el: document.getElementById('w1'), cx: 26, cy: 44 },
      { el: document.getElementById('w2'), cx: 54, cy: 44 },
      { el: document.getElementById('w3'), cx: 82, cy: 44 },
      { el: document.getElementById('w4'), cx: 108, cy: 44 },
    ];

    function animateWheels() {
      angle = (angle + 3) % 360;
      wheels.forEach(w => {
        if (w.el) {
          w.el.setAttribute('transform', `rotate(${angle} ${w.cx} ${w.cy})`);
        }
      });
      requestAnimationFrame(animateWheels);
    }
    animateWheels();

    update();
  </script>
</body>
</html>
