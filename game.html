<style>

<body class="game-page">
<canvas id="c"></canvas>
<div id="nv-tint"></div>
<div id="vignette"></div>
<div id="scanlines"></div>
<div id="shud">
  <div class="brk tl"></div><div class="brk tr"></div><div class="brk bl"></div><div class="brk br"></div>
  <div class="hrow" id="htl">SPIKE MR SEEKER CAM<br>MODE: <span class="hv" id="hmode">LOCK-ON</span><br>ALT: <span class="hv" id="halt">---</span>m</div>
  <div class="hrow" id="htr">IDF UNIT 7432<br>SPEED: <span class="hv" id="hspd">---</span>m/s<br>RANGE: <span class="hv" id="hrng">---</span>m</div>
  <div class="hrow" id="hbl">TARGETS: <span class="hv" id="htgt">3 ACTIVE</span></div>
  <div class="hrow" id="hbr">SCORE: <span class="hv" id="hsc">0</span></div>
</div>

<button id="lbtn" onclick="launch()">🚀<span>LAUNCH</span></button>

<script>
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W, H;
function resize() {
  W = cv.width = window.innerWidth;
  H = cv.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let mouse = { x: W / 2, y: H / 2 };
cv.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
cv.addEventListener('touchmove', e => { e.preventDefault(); mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }, { passive: false });

const HOR = 0.40; // Horizon
const BOT = 0.96; // Ground line

let score = 0;
let phase = 'pad';
let lp = 0;
let shake = 0;
let hfl = 0;
let T = 0;

let exps = [], parts = [];
let seekX = 0, seekY = 0;

let camera = { wx: 0, wz: 0, wh: 0 }; // Camera follows missile position

// RNG util
function rng(seed) {
  let x = seed;
  return function() {
    x = (x * 16807) % 2147483647;
    return (x - 1) / 2147483646;
  };
}

// Perspective projection adapting to camera pos
function proj(wx, wz) {
  const relWx = wx - camera.wx;
  const relWz = wz - camera.wz;

  const hy = H * HOR;
  const by = H * BOT;
  const sy = hy + (by - hy) * (1 - relWz);
  const spread = 0.45 + (1 - relWz) * 1.5;
  const sx = W * 0.5 + relWx * W * spread * 0.5;
  return { sx, sy };
}

function dscale(wz) {
  return 0.18 + (1 - wz) * 0.82;
}

  <script>
let objs = [];

function buildScene() {
  objs = [];
  const r = rng(99);

  // Trees (example)
  for(let i=0; i<14; i++) {
    objs.push({
      type:'tree',
      wx: camera.wx - 1.1 + i*0.16 + r()*0.07,
      wd: 0.70 + r()*0.14,
      v: r() > 0.5 ? 0 : 1,
      sz: 0.055 + r()*0.04
    });
  }

  // Buildings (add your building data here, adapted for camera.wx and .wz)

  // Tanks (example)
  for(let i=0;i<3;i++) {
    objs.push({
      type:'tank',
      wx: camera.wx + (-0.3 + i*0.3),
      wd:0.82 + r()*0.1,
      alive: true,
      ang: 0.15
    });
  }

  // Add troops, vehicles similarly
}

// Call at start and later if needed
buildScene();

// Drawing Trees
function drawTree(o){
  const {sx, sy, sc} = proj(o.wx,o.wd);
  if(sx < -90 || sx > W + 90) return;
  const th = H * o.sz * sc * 3.8, tw = th * 0.6;
  const r = rng(Math.floor(o.wx*100 + o.wd*200));
  r();
  if(o.v === 0) { // Cypress
    ctx.fillStyle = `rgb(${12 + r()*8|0},${26 + r()*10|0},${8 + r()*6|0})`;
    ctx.beginPath(); ctx.moveTo(sx, sy - th); ctx.lineTo(sx - tw*0.32, sy); ctx.lineTo(sx + tw*0.32, sy); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#261408'; ctx.beginPath(); ctx.roundRect(sx - 2, sy, 4, th*0.14, 1); ctx.fill();
  } else if(o.v === 1) { // Olive
    ctx.fillStyle = `rgb(${22 + r()*10|0},${40 + r()*12|0},${14 + r()*8|0})`;
    ctx.beginPath(); ctx.ellipse(sx, sy - th*0.5, tw*0.75, th*0.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(45,75,25,0.35)';
    ctx.beginPath(); ctx.ellipse(sx - tw*0.12, sy - th*0.62, tw*0.32, th*0.26, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#261408';
    ctx.beginPath(); ctx.roundRect(sx - 3, sy, 6, th*0.18, 1); ctx.fill();
  } else { // Scrub
    ctx.fillStyle = `rgb(${16 + r()*8|0},${30 + r()*10|0},${8 + r()*5|0})`;
    ctx.beginPath(); ctx.ellipse(sx, sy - th*0.38, tw*0.95, th*0.38, 0, 0, Math.PI*2); ctx.fill();
  }
}

// Similar draw functions for buildings, tanks, troops, vehicles...

class Missile {
  constructor() {
    this.wx = camera.wx;
    this.wz = camera.wz + 0.05;
    this.wh = 0;
    this.vx = 0;
    this.vz = 0.004;
    this.vh = 0.028;
    this.active = true;
    this.trail = [];
    this.maxTrail = 32;
    this.riseTimer = 22;
  }
  update() {
    if(!this.active) return;
    this.trail.unshift({ wx: this.wx, wz: this.wz, wh: this.wh });
    if(this.trail.length > this.maxTrail) this.trail.pop();

    if(this.riseTimer > 0) {
      this.wh += this.vh * (1 - this.riseTimer / 30);
      this.wz += this.vz;
      this.riseTimer--;
    } else {
      const hy = H * HOR, by = H * BOT;
      const rawZ = (mouse.y - hy) / (by - hy);
      const targetWz = Math.max(0.04, Math.min(0.99, rawZ));
      const spread = 0.45 + (1 - targetWz) * 1.5;
      const targetWx = (mouse.x - W * 0.5) / (W * spread * 0.5);
      const targetWh = 0;

      const dx = targetWx - this.wx;
      const dz = targetWz - this.wz;
      const dh = targetWh - this.wh;
      const dist = Math.sqrt(dx*dx + dz*dz + dh*dh) + 0.001;
      const spd = 0.024;

      this.vx += (dx / dist * spd - this.vx) * 0.11;
      this.vz += (dz / dist * spd - this.vz) * 0.11;
      this.vh += (dh / dist * spd - this.vh) * 0.11;

      const s = Math.sqrt(this.vx*this.vx + this.vz*this.vz + this.vh*this.vh);
      if(s > spd) { this.vx *= spd/s; this.vz *= spd/s; this.vh *= spd/s; }

      this.wx += this.vx;
      this.wz += this.vz;
      this.wh += this.vh;

      if(this.wh < 0) {
        this.wh = 0;
        this.active = false;
      }
    }
    if(this.wz > camera.wz + 4 || Math.abs(this.wx - camera.wx) > 4) this.active = false;

    camera.wx = this.wx;
    camera.wz = this.wz;
    camera.wh = this.wh;
  }
  screenPos() {
    const { sx, sy } = proj(this.wx, this.wz);
    const hy = H * HOR, by = H * BOT;
    const sc = dscale(this.wz - camera.wz);
    const altPx = this.wh * (by - hy) * 2.0 * sc;
    return { sx, sy: sy - altPx };
  }
  draw() {
    if(!this.active) return;
    const { sx, sy } = this.screenPos();
    const sc = dscale(this.wz - camera.wz);

    ctx.save();
    ctx.translate(sx, sy);

    // Simple missile shape
    ctx.fillStyle = '#f00';
    ctx.beginPath();
    ctx.moveTo(0, -20);
    ctx.lineTo(6, 10);
    ctx.lineTo(-6, 10);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }
}

let missile = null;

function launch() {
  if(phase !== 'pad') return;
  missile = new Missile();
  phase = 'seeker';
  document.getElementById('lbtn').classList.add('gone');
}

function drawBackground() {
  const hy = H * HOR, by = H * BOT;
  const vx = W * 0.5;
  const camZ = camera.wz;
  const mxshift = (camera.wx * 50) % W;

  // Sky
  const sky = ctx.createLinearGradient(0,0,0,hy);
  let offset = (camZ * 0.02) % 1;
  sky.addColorStop(0 - offset, '#050912');
  sky.addColorStop(0.6 - offset, '#0e1008');
  sky.addColorStop(1 - offset, '#1c1408');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, hy);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  for(let i=0; i<100; i++) {
    const sx = ((i*137.5 + 23) + camZ * 50) % W;
    const sy = ((i*83.1 + 11) % (hy*0.9));
    const ss = 0.3 + (i % 3) * 0.35;
    ctx.beginPath();
    ctx.arc(sx, sy, ss, 0, Math.PI*2);
    ctx.fill();
  }

  // Mountains
  ctx.fillStyle = '#160e04';
  ctx.beginPath();
  ctx.moveTo(0, hy);
  const mp = [0,0.07,0.14,0.22,0.28,0.36,0.44,0.52,0.6,0.68,0.76,0.84,0.92,1.0];
  const mh = [0,0.045,0.09,0.055,0.10,0.065,0.04,0.08,0.055,0.10,0.045,0.07,0.035,0];
  mp.forEach((t,i) => ctx.lineTo(((W * t) + mxshift) % W, hy - mh[i] * H * 0.14));
  ctx.lineTo(W, hy);
  ctx.closePath();
  ctx.fill();

  // Ground
  const grd = ctx.createLinearGradient(0, hy, 0, H);
  grd.addColorStop(0, '#281604');
  grd.addColorStop(0.1, '#341e0a');
  grd.addColorStop(0.5, '#44280e');
  grd.addColorStop(1, '#523418');
  ctx.fillStyle = grd;
  ctx.fillRect(0, hy, W, H - hy);

  // Perspective grid and dune textures here...
  // (You can add the rest from your existing code here)
}

function loop() {
  T++;
  ctx.clearRect(0,0,W,H);
  drawBackground();

  if(missile && missile.active) {
    missile.update();
    missile.draw();
  } else if(phase === 'seeker') {
    phase = 'pad';
    missile = null;
    document.getElementById('lbtn').classList.remove('gone');
  }

  // Update and draw trees, buildings, tanks etc. relative to camera position

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>

  <script>
// Drawing trees
function drawTree(o) {
  const { sx, sy, sc } = proj(o.wx, o.wd);
  if (sx < -90 || sx > W + 90) return;
  const th = H * o.sz * sc * 3.8, tw = th * 0.6;
  const r = rng(Math.floor(o.wx * 100 + o.wd * 200));
  r();
  if (o.v === 0) { // Cypress
    ctx.fillStyle = `rgb(${12 + r() * 8 | 0},${26 + r() * 10 | 0},${8 + r() * 6 | 0})`;
    ctx.beginPath();
    ctx.moveTo(sx, sy - th);
    ctx.lineTo(sx - tw * 0.32, sy);
    ctx.lineTo(sx + tw * 0.32, sy);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#261408';
    ctx.beginPath();
    ctx.roundRect(sx - 2, sy, 4, th * 0.14, 1);
    ctx.fill();
  } else if (o.v === 1) { // Olive
    ctx.fillStyle = `rgb(${22 + r() * 10 | 0},${40 + r() * 12 | 0},${14 + r() * 8 | 0})`;
    ctx.beginPath();
    ctx.ellipse(sx, sy - th * 0.5, tw * 0.75, th * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(45,75,25,0.35)';
    ctx.beginPath();
    ctx.ellipse(sx - tw * 0.12, sy - th * 0.62, tw * 0.32, th * 0.26, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#261408';
    ctx.beginPath();
    ctx.roundRect(sx - 3, sy, 6, th * 0.18, 1);
    ctx.fill();
  } else { // Scrub
    ctx.fillStyle = `rgb(${16 + r() * 8 | 0},${30 + r() * 10 | 0},${8 + r() * 5 | 0})`;
    ctx.beginPath();
    ctx.ellipse(sx, sy - th * 0.38, tw * 0.95, th * 0.38, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Drawing tanks
function drawTank(o) {
  const { sx, sy, sc } = proj(o.wx, o.wd);
  if (sx < -110 || sx > W + 110) return;
  const s = sc * 0.72;

  ctx.fillStyle = `rgba(18, 32, 8, 0.48)`;
  ctx.beginPath(); ctx.ellipse(sx, sy, 58 * s, 22 * s, o.ang, 0, Math.PI * 2); ctx.fill();
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(o.ang);
  ctx.scale(s, s);

  // Hull and turret (simplified)
  ctx.fillStyle = '#4a4a28';
  ctx.fillRect(-30, -10, 60, 20); // hull
  ctx.fillStyle = '#666644';
  ctx.fillRect(-15, -20, 30, 10); // turret base

  ctx.restore();
}

// Drawing troops
function drawTroop(o) {
  const { sx, sy, sc } = proj(o.wx, o.wd);
  if (sx < -20 || sx > W + 20) return;
  const s = sc * 0.3;
  ctx.fillStyle = 'green';
  ctx.beginPath();
  ctx.arc(sx, sy - s * 10, s * 6, 0, Math.PI * 2);
  ctx.fill();
}

// Drawing vehicles
function drawVeh(o) {
  const { sx, sy, sc } = proj(o.wx, o.wd);
  if (sx < -30 || sx > W + 30) return;
  const s = sc * 0.6;
  ctx.fillStyle = o.col || 'gray';
  ctx.fillRect(sx - s * 15, sy - s * 10, s * 30, s * 15);
}

// Explosion class
class Explosion {
  constructor(sx, sy, sc) {
    this.sx = sx; this.sy = sy; this.sc = sc || 1;
    this.frame = 0;
    this.maxFrame = 48;
    this.alive = true;

    for (let i = 0; i < 30; i++) {
      const a = Math.random() * Math.PI * 2;
      const speed = (1 + Math.random() * 6) * sc;
      parts.push({
        x: sx,
        y: sy,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed * 0.5,
        life: 1,
        decay: 0.018 + Math.random() * 0.022,
        size: (2 + Math.random() * 5) * sc,
        color: ['#ff4400', '#ff8800', '#ffcc00', '#fff'][Math.floor(Math.random() * 4)]
      });
    }

    shake = 9 * sc;
    hfl = 1;
  }
  update() {
    this.frame++;
    if (this.frame > this.maxFrame) this.alive = false;
  }
  draw() {
    const p = this.frame / this.maxFrame;
    const r1 = 80 * p * this.sc;
    const r2 = 50 * Math.sin(p * Math.PI) * this.sc;
    const grad = ctx.createRadialGradient(this.sx, this.sy, 0, this.sx, this.sy, r1);
    grad.addColorStop(0, `rgba(255,220,50,${(1 - p) * 0.85})`);
    grad.addColorStop(0.4, `rgba(255,80,0,${(1 - p) * 0.5})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(this.sx, this.sy, Math.max(1, r1), 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    if (p < 0.5) {
      ctx.beginPath();
      ctx.arc(this.sx, this.sy, r2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,200,${(1 - p * 2) * 0.9})`;
      ctx.fill();
    }
    ctx.beginPath();
    ctx.arc(this.sx, this.sy, r1 * 0.88, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,150,50,${(1 - p) * 0.4})`;
    ctx.lineWidth = 3 * this.sc;
    ctx.stroke();
  }
}

// Draw Crosshair (simple dot)
function drawXhair() {
  const cx = mouse.x, cy = mouse.y;
  ctx.save();
  ctx.fillStyle = 'rgba(255,50,50,0.9)';
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// Main loop
function loop() {
  T++;
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  if (missile && missile.active) {
    missile.update();
    missile.draw();
  } else if (phase === 'seeker') {
    phase = 'pad';
    missile = null;
    document.getElementById('lbtn').classList.remove('gone');
  }

  objs.forEach(o => {
    if (o.type === 'tree') drawTree(o);
    else if (o.type === 'bld') drawBld(o);
    else if (o.type === 'tank' && o.alive) drawTank(o);
    else if (o.type === 'troop') drawTroop(o);
    else if (o.type === 'veh') drawVeh(o);
  });

  // Update and draw particles
  parts = parts.filter(p => p.life > 0);
  parts.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.07;
    p.life -= p.decay;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Update and draw explosions
  exps = exps.filter(e => e.alive);
  exps.forEach(e => {
    e.update();
    e.draw();
  });

  drawXhair();
  updateHUD();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

// Launch function
function launch() {
  if (phase !== 'pad') return;
  missile = new Missile();
  phase = 'seeker';
  document.getElementById('lbtn').classList.add('gone');
}
</script>
