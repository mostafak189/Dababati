<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>SPIKE ATGM</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body class="game-page">
<canvas id="c"></canvas>
<div id="nv-tint"></div>
<div id="vignette"></div>
<div id="scanlines"></div>
<div id="shud">
  <div class="brk tl"></div><div class="brk tr"></div><div class="brk bl"></div><div class="brk br"></div>
  <div class="hrow" id="htl">SPIKE MR SEEKER CAM<br>MODE: <span class="hv" id="hmode">LOCK-ON</span><br>ALT: <span class="hv" id="halt">---</span>m</div>
  <div class="hrow" id="htr">IDF UNIT 7432<br>SPEED: <span class="hv" id="hspd">---</span>m/s<br>RANGE: <span class="hv" id="hrng">---</span>m</div>
  <div class="hrow" id="hbl">TARGETS: <span class="hv" id="htgt">3 ACTIVE</span></div>
  <div class="hrow" id="hbr">SCORE: <span class="hv" id="hsc">0</span></div>
</div>
<div id="title">SPIKE ATGM</div>
<div id="pmsg"></div>
<button id="lbtn" onclick="launch()">🚀<span>LAUNCH</span></button>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
resize(); window.addEventListener('resize',resize);

let mx=0,my=0,phase='pad',score=0,T=0,lp=0,shake=0,hfl=0;
let exps=[],parts=[];
let seekX=0,seekY=0;

cv.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
cv.addEventListener('touchmove',e=>{e.preventDefault();mx=e.touches[0].clientX;my=e.touches[0].clientY;},{passive:false});
cv.addEventListener('touchstart',e=>{mx=e.touches[0].clientX;my=e.touches[0].clientY;},{passive:true});

const HOR=0.40;

function proj(wx,wd,wz){
  const hy=H*HOR,by=H*0.96;
  const sc=0.12+(1-wd)*0.88;
  const sy=hy+(by-hy)*(1-wd)-wz*(by-hy)*1.5*sc - seekY*H*0.35;
  const sp=0.36+(1-wd)*1.65;
  const sx=W*0.5+(wx-seekX)*W*sp*0.5;
  return {sx,sy,sc};
}
function rng(s){let x=s;return()=>{x=(x*16807)%2147483647;return(x-1)/2147483646;};}

// Scene objects
let objs=[];
function buildScene(){
  objs=[];
  const r=rng(99);
  // Trees
  const treeData=[
    ...Array.from({length:14},(_,i)=>({type:'tree',wx:-1.1+i*0.16+r()*0.07,wd:0.70+r()*0.14,v:r()>0.5?0:1,sz:0.055+r()*0.04})),
    ...Array.from({length:11},(_,i)=>({type:'tree',wx:0.5+i*0.13+r()*0.05,wd:0.62+r()*0.16,v:Math.floor(r()*3),sz:0.05+r()*0.035})),
    ...Array.from({length:20},(_,i)=>({type:'tree',wx:-1.2+r()*2.4,wd:0.38+r()*0.28,v:Math.floor(r()*3),sz:0.035+r()*0.025})),
    ...Array.from({length:16},(_,i)=>({type:'tree',wx:-0.8+r()*1.6,wd:0.55+r()*0.18,v:Math.floor(r()*3),sz:0.04+r()*0.03})),
    ...Array.from({length:7}, (_,i)=>({type:'tree',wx:-1.4+r()*2.8,wd:0.14+r()*0.14,v:2,sz:0.02+r()*0.012})),
  ];
  // Buildings
  const bldDefs=[
    {wx:-0.20,wd:0.83,bw:0.18,bh:0.13,fl:2,col:'#c8b89a',dmg:false},
    {wx:0.08, wd:0.86,bw:0.14,bh:0.10,fl:2,col:'#b8a888',dmg:false},
    {wx:-0.40,wd:0.80,bw:0.20,bh:0.14,fl:3,col:'#c0a878',dmg:false},
    {wx:0.24, wd:0.81,bw:0.16,bh:0.09,fl:1,col:'#d0b890',dmg:false},
    {wx:-0.08,wd:0.91,bw:0.13,bh:0.11,fl:2,col:'#baa880',dmg:false},
    {wx:0.40, wd:0.88,bw:0.18,bh:0.13,fl:2,col:'#c4ac84',dmg:false},
    {wx:-0.56,wd:0.85,bw:0.14,bh:0.08,fl:1,col:'#b8a076',dmg:false},
    {wx:0.60, wd:0.83,bw:0.15,bh:0.10,fl:2,col:'#c4ac84',dmg:true},
    {wx:-0.28,wd:0.93,bw:0.11,bh:0.09,fl:2,col:'#bca882',dmg:false},
    {wx:0.14, wd:0.95,bw:0.12,bh:0.08,fl:1,col:'#cbb99b',dmg:false},
    {wx:0.02, wd:0.89,bw:0.10,bh:0.15,fl:3,col:'#e8e0cc',dmg:false,mosque:true},
    {wx:-0.74,wd:0.71,bw:0.13,bh:0.07,fl:1,col:'#b09870',dmg:false},
    {wx:0.74, wd:0.73,bw:0.12,bh:0.08,fl:1,col:'#b89e78',dmg:false},
    {wx:-0.46,wd:0.69,bw:0.15,bh:0.07,fl:1,col:'#a89068',dmg:false},
    {wx:0.52, wd:0.67,bw:0.14,bh:0.07,fl:1,col:'#b09870',dmg:false},
    {wx:-0.02,wd:0.77,bw:0.09,bh:0.05,fl:1,col:'#988060',dmg:true},
    {wx:0.30, wd:0.74,bw:0.11,bh:0.06,fl:1,col:'#a89070',dmg:false},
  ];
  // Tanks
  const tanks=[
    {type:'tank',wx:-0.24,wd:0.82,alive:true,id:0,ang:0.15},
    {type:'tank',wx:0.32, wd:0.87,alive:true,id:1,ang:-0.22},
    {type:'tank',wx:-0.52,wd:0.79,alive:true,id:2,ang:0.28},
  ];
  // Troops
  const troops=Array.from({length:35},(_,i)=>({type:'troop',wx:-0.9+r()*1.8,wd:0.60+r()*0.30,ph:r()*Math.PI*2,mov:r()>0.45}));
  // Vehicles
  const vehs=[
    {type:'veh',wx:-0.32,wd:0.75,col:'#5a4a30'},{type:'veh',wx:0.44,wd:0.78,col:'#3a3028'},{type:'veh',wx:-0.60,wd:0.89,col:'#4a4038'}
  ];
  objs=[...treeData,...bldDefs.map(b=>({type:'bld',...b})),...tanks,...troops,...vehs];
}
buildScene();

// ── Launchpad ──────────────────────────────────────────────────
function drawPad(){
  const hy=H*HOR;
  const sky=ctx.createLinearGradient(0,0,0,hy);
  sky.addColorStop(0,'#060c18'); sky.addColorStop(0.6,'#0e1220'); sky.addColorStop(1,'#161808');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,hy);
  // stars
  for(let i=0;i<130;i++){
    const sx=(i*137+9)%W,sy=(i*79+5)%(hy*0.93);
    const a=0.3+Math.sin(T*0.05+i)*0.3;
    ctx.globalAlpha=a; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(sx,sy,0.3+(i%3)*0.3,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  // moon
  ctx.fillStyle='#e8ddb0'; ctx.beginPath(); ctx.arc(W*0.14,H*0.11,20,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#cdb898'; ctx.beginPath(); ctx.arc(W*0.14+6,H*0.11-4,16,0,Math.PI*2); ctx.fill();
  // ground
  const gnd=ctx.createLinearGradient(0,hy,0,H);
  gnd.addColorStop(0,'#161610'); gnd.addColorStop(0.3,'#1e1e16'); gnd.addColorStop(1,'#28261c');
  ctx.fillStyle=gnd; ctx.fillRect(0,hy,W,H-hy);
  // concrete seams
  ctx.strokeStyle='rgba(255,255,255,0.03)'; ctx.lineWidth=1;
  for(let i=0;i<10;i++){ const py=hy+i*(H-hy)/10; ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(W,py); ctx.stroke(); }
  for(let i=0;i<18;i++){ ctx.beginPath(); ctx.moveTo(i*W/9,hy); ctx.lineTo(i*W/9,H); ctx.stroke(); }
  // mountains
  ctx.fillStyle='#0c1008';
  ctx.beginPath(); ctx.moveTo(0,hy);
  const mp=[0,0.08,0.14,0.22,0.30,0.38,0.50,0.58,0.66,0.74,0.82,0.90,1.0];
  const mh=[0,0.04,0.08,0.05,0.09,0.06,0.03,0.07,0.05,0.09,0.04,0.06,0];
  mp.forEach((t,i)=>ctx.lineTo(W*t,hy-mh[i]*H*0.10));
  ctx.lineTo(W,hy); ctx.closePath(); ctx.fill();
  // gantry
  const cx=W*0.5,cy=hy;
  ctx.strokeStyle='#303028'; ctx.lineWidth=8;
  ctx.beginPath(); ctx.moveTo(cx-85,cy); ctx.lineTo(cx-64,cy-H*0.31); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+85,cy); ctx.lineTo(cx+64,cy-H*0.31); ctx.stroke();
  ctx.lineWidth=5;
  for(let i=1;i<=4;i++){ const gy=cy-i*H*0.075,sp=85-i*14; ctx.beginPath(); ctx.moveTo(cx-sp,gy); ctx.lineTo(cx+sp,gy); ctx.stroke(); }
  ctx.fillStyle='#222218'; ctx.strokeStyle='#44443a'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.roundRect(cx-95,cy-H*0.33,190,8,2); ctx.fill(); ctx.stroke();
  // warning lights
  const lc=Math.sin(T*0.09)>0?'#ff3300':'#550000';
  [cx-64,cx+64].forEach(lx=>{ ctx.fillStyle=lc; ctx.beginPath(); ctx.arc(lx,cy-H*0.31+12,5,0,Math.PI*2); ctx.fill(); if(Math.sin(T*0.09)>0){ ctx.globalAlpha=0.28; ctx.fillStyle='#ff3300'; ctx.beginPath(); ctx.arc(lx,cy-H*0.31+12,20,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; } });
  // missile on rail
  drawPadMissile(cx,cy-H*0.33);
  // ground equipment
  drawGndEquip();
  // console
  drawConsole();
}

function drawPadMissile(cx,top){
  const mh=H*0.26;
  ctx.fillStyle='#484840'; ctx.beginPath(); ctx.roundRect(cx-13,top-mh,26,mh,3); ctx.fill();
  ctx.fillStyle='#282820'; ctx.beginPath(); ctx.moveTo(cx-13,top-mh); ctx.lineTo(cx+13,top-mh); ctx.lineTo(cx,top-mh-38); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#585850'; ctx.beginPath(); ctx.roundRect(cx-15,top-48,30,48,2); ctx.fill();
  ctx.fillStyle='#383830';
  [[cx-13,top-28,cx-28,top,cx-13,top],[cx+13,top-28,cx+28,top,cx+13,top]].forEach(pts=>{ ctx.beginPath(); ctx.moveTo(pts[0],pts[1]); ctx.lineTo(pts[2],pts[3]); ctx.lineTo(pts[4],pts[5]); ctx.closePath(); ctx.fill(); });
  ctx.fillStyle='#1a1a14'; ctx.beginPath(); ctx.roundRect(cx-9,top-4,18,7,1); ctx.fill();
  // idle glow
  const gl=ctx.createRadialGradient(cx,top+12,0,cx,top+12,28);
  gl.addColorStop(0,`rgba(255,120,30,${0.08+Math.sin(T*0.1)*0.04})`); gl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(cx,top+12,28,0,Math.PI*2); ctx.fill();
  // label
  ctx.fillStyle='rgba(57,255,20,0.55)'; ctx.font='bold 10px "Orbitron",monospace'; ctx.textAlign='center';
  ctx.fillText('▶  PRESS LAUNCH',cx,top-mh-50); ctx.textAlign='left';
  ctx.fillStyle='rgba(200,180,80,0.6)'; ctx.font='7px monospace'; ctx.textAlign='center';
  ctx.fillText('SPIKE-MR  IDF-7432',cx,top-mh/2); ctx.textAlign='left';
}

function drawGndEquip(){
  const tx=W*0.5,ty=H*0.80;
  ctx.fillStyle='#282e20'; ctx.strokeStyle='#383e28'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(tx-120,ty-38,82,38,3); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#1c2018'; ctx.beginPath(); ctx.roundRect(tx-200,ty-30,80,30,2); ctx.fill(); ctx.stroke();
  [tx-182,tx-122,tx-72,tx-22].forEach(wx=>{ ctx.fillStyle='#0e0e0c'; ctx.strokeStyle='#222'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(wx,ty,14,0,Math.PI*2); ctx.fill(); ctx.stroke(); ctx.fillStyle='#1e1e1c'; ctx.beginPath(); ctx.arc(wx,ty,7,0,Math.PI*2); ctx.fill(); });
}

function drawConsole(){
  const tx=W*0.5,ty=H;
  const bw=310,bh=85,bx=tx-bw/2,by=ty-bh-8;
  ctx.fillStyle='rgba(8,14,6,0.94)'; ctx.strokeStyle='#39ff14'; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,6); ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(4,18,4,0.96)'; ctx.beginPath(); ctx.roundRect(bx+10,by+10,186,66,3); ctx.fill();
  ctx.fillStyle='#39ff14'; ctx.font='6.5px "Share Tech Mono",monospace';
  ctx.fillText('SPIKE MR  ◆  IDF GROUND UNIT',bx+14,by+22);
  ctx.fillText('STATUS: ARMED & READY',bx+14,by+34);
  ctx.fillStyle='#ff8800'; ctx.fillText('TARGET ZONE: SOUTH LEBANON',bx+14,by+46);
  ctx.fillStyle='#39ff14'; ctx.fillText('SEEKER: STANDBY  ◆  WARHEAD: ARMED',bx+14,by+58);
  ctx.fillText('PRESS LAUNCH TO FIRE MISSILE',bx+14,by+70);
  const lights=[[bx+206,by+22,'#39ff14'],[bx+226,by+22,'#39ff14'],[bx+246,by+22,'#ff8800'],[bx+206,by+42,'#39ff14'],[bx+226,by+42,'#ff3300'],[bx+246,by+42,'#39ff14']];
  lights.forEach(([lx,ly,lc])=>{ ctx.fillStyle=lc; ctx.beginPath(); ctx.arc(lx,ly,5,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=0.22; ctx.beginPath(); ctx.arc(lx,ly,11,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; });
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.roundRect(bx+264,by+15,36,56,4); ctx.fill();
  ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.arc(bx+282,by+43,16,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(bx+282,by+43,8,0,Math.PI*2); ctx.fill();
}

// ── Launch animation ───────────────────────────────────────────
function drawLaunch(){
  drawPad();
  const cx=W*0.5,baseY=H*HOR-H*0.33,mh=H*0.26;
  const mY=baseY-lp*H*1.5;
  // plume
  const ph=22+lp*H*0.55;
  const pg=ctx.createLinearGradient(cx,baseY,cx,baseY+ph);
  pg.addColorStop(0,'rgba(255,200,50,0.98)'); pg.addColorStop(0.2,'rgba(255,100,20,0.85)'); pg.addColorStop(0.6,'rgba(180,50,8,0.5)'); pg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=pg; ctx.beginPath(); ctx.ellipse(cx,baseY+ph*0.5,14+lp*35,ph*0.5,0,0,Math.PI*2); ctx.fill();
  // smoke puffs
  for(let i=0;i<10;i++){ ctx.globalAlpha=Math.max(0,0.13-i*0.012); ctx.fillStyle='#778'; ctx.beginPath(); ctx.arc(cx+(Math.sin(i+T*0.08)*12),baseY+i*22,10+i*5,0,Math.PI*2); ctx.fill(); }
  ctx.globalAlpha=1;
  if(mY>-120){
    ctx.save(); ctx.translate(cx,mY);
    ctx.fillStyle='#484840'; ctx.beginPath(); ctx.roundRect(-13,-mh,26,mh,3); ctx.fill();
    ctx.fillStyle='#282820'; ctx.beginPath(); ctx.moveTo(-13,-mh); ctx.lineTo(13,-mh); ctx.lineTo(0,-mh-38); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#585850'; ctx.beginPath(); ctx.roundRect(-15,-48,30,48,2); ctx.fill();
    ctx.fillStyle='#383830';
    ctx.beginPath(); ctx.moveTo(-13,-28); ctx.lineTo(-28,0); ctx.lineTo(-13,0); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(13,-28);  ctx.lineTo(28,0);  ctx.lineTo(13,0);  ctx.closePath(); ctx.fill();
    const flk=0.6+Math.random()*0.4;
    const fg=ctx.createLinearGradient(0,5,0,5+42*flk);
    fg.addColorStop(0,'rgba(255,220,50,1)'); fg.addColorStop(0.4,'rgba(255,100,20,0.8)'); fg.addColorStop(1,'rgba(255,40,0,0)');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.ellipse(0,5+21*flk,9,21*flk,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── Seeker view ────────────────────────────────────────────────
function drawSeeker(){
  seekX+=(((mx/W)-0.5)*0.72-seekX)*0.07;
  seekY+=(((my/H)-0.5)*0.5-seekY)*0.07;
  const hy=H*HOR,by=H*0.96;
  // sky
  const sky=ctx.createLinearGradient(0,0,0,hy);
  sky.addColorStop(0,'#04080a'); sky.addColorStop(1,'#0a1008');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,hy);
  // NV stars
  ctx.fillStyle='rgba(180,255,180,0.3)';
  for(let i=0;i<70;i++){ const sx=(i*191+9)%W-seekX*W*0.07,sy=(i*67+3)%(hy*0.9); ctx.beginPath(); ctx.arc(sx,sy,0.4,0,Math.PI*2); ctx.fill(); }
  // ground
  const grd=ctx.createLinearGradient(0,hy,0,H);
  grd.addColorStop(0,'#0c1608'); grd.addColorStop(0.15,'#101c0a'); grd.addColorStop(0.6,'#162010'); grd.addColorStop(1,'#1c2814');
  ctx.fillStyle=grd; ctx.fillRect(0,hy,W,H-hy);
  // perspective grid
  const vx=W*0.5-seekX*W*0.14;
  ctx.strokeStyle='rgba(57,255,20,0.04)'; ctx.lineWidth=0.5;
  for(let c=0;c<=15;c++){ const bx=W*0.03+(c/15)*W*0.94; ctx.beginPath(); ctx.moveTo(vx,hy); ctx.lineTo(bx-seekX*W*0.45,H*0.96); ctx.stroke(); }
  for(let r=1;r<=13;r++){ const ft=Math.pow(r/13,1.6),py=hy+ft*(H*0.96-hy),df=(py-hy)/(H*0.96-hy),sp=0.36+(1-df)*1.65; ctx.beginPath(); ctx.moveTo(vx-W*sp*0.5,py); ctx.lineTo(vx+W*sp*0.5,py); ctx.stroke(); }
  // field strips
  const fcs=['#0e1a08','#121e0a','#10180a','#0e1608'];
  for(let i=0;i<7;i++){ const fy=hy+(i/7)*(H*0.96-hy)*0.9,fw=W*(0.58+i*0.055),fx=W*0.5-fw/2-seekX*W*0.13*(1-i/7); ctx.fillStyle=fcs[i%4]; ctx.globalAlpha=0.55; ctx.beginPath(); ctx.roundRect(fx,fy,fw,9,1); ctx.fill(); ctx.globalAlpha=1; }
  // road
  const rx=W*0.5-seekX*W*0.09;
  ctx.strokeStyle='#252520'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(rx,hy+4); ctx.lineTo(W*0.5-seekX*W*0.48,H*0.96); ctx.stroke();
  ctx.strokeStyle='rgba(200,180,90,0.12)'; ctx.lineWidth=0.6; ctx.setLineDash([8,12]);
  ctx.beginPath(); ctx.moveTo(rx,hy+4); ctx.lineTo(W*0.5-seekX*W*0.48,H*0.96); ctx.stroke(); ctx.setLineDash([]);
  // mountains silhouette
  ctx.fillStyle='#080e06';
  ctx.beginPath(); ctx.moveTo(0,hy);
  const mp=[0,0.07,0.14,0.22,0.3,0.38,0.5,0.58,0.66,0.74,0.82,0.9,1.0];
  const mhv=[0,0.04,0.08,0.05,0.1,0.06,0.04,0.08,0.05,0.1,0.04,0.06,0];
  mp.forEach((t,i)=>ctx.lineTo(W*t-seekX*W*0.15,hy-mhv[i]*H*0.12));
  ctx.lineTo(W,hy); ctx.closePath(); ctx.fill();
  // objects sorted back to front
  const sorted=[...objs].sort((a,b)=>(b.wd||0)-(a.wd||0));
  sorted.forEach(o=>{ if(o.type==='tree') drawTree(o); else if(o.type==='bld') drawBld(o); else if(o.type==='tank'&&o.alive) drawTank(o); else if(o.type==='troop') drawTroop(o); else if(o.type==='veh') drawVeh(o); });
  // explosions & particles
  exps=exps.filter(e=>e.alive); exps.forEach(e=>{e.update();e.draw();});
  parts=parts.filter(p=>p.life>0); parts.forEach(p=>{ p.x+=p.vx;p.y+=p.vy;p.vy+=0.07;p.life-=p.dc; ctx.globalAlpha=p.life; ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; });
  drawXhair();
  updateHUD();
}

// ── Tree ───────────────────────────────────────────────────────
function drawTree(o){
  const {sx,sy,sc}=proj(o.wx,o.wd,0);
  if(sx<-90||sx>W+90) return;
  const th=H*o.sz*sc*3.8, tw=th*0.6;
  const r=rng(Math.floor(o.wx*100+o.wd*200)); r();
  if(o.v===0){ // cypress
    ctx.fillStyle=`rgb(${12+r()*8|0},${26+r()*10|0},${8+r()*6|0})`;
    ctx.beginPath(); ctx.moveTo(sx,sy-th); ctx.lineTo(sx-tw*0.32,sy); ctx.lineTo(sx+tw*0.32,sy); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#261408'; ctx.beginPath(); ctx.roundRect(sx-2,sy,4,th*0.14,1); ctx.fill();
  } else if(o.v===1){ // olive
    ctx.fillStyle=`rgb(${22+r()*10|0},${40+r()*12|0},${14+r()*8|0})`;
    ctx.beginPath(); ctx.ellipse(sx,sy-th*0.5,tw*0.75,th*0.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(45,75,25,0.35)'; ctx.beginPath(); ctx.ellipse(sx-tw*0.12,sy-th*0.62,tw*0.32,th*0.26,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#261408'; ctx.beginPath(); ctx.roundRect(sx-3,sy,6,th*0.18,1); ctx.fill();
  } else { // scrub
    ctx.fillStyle=`rgb(${16+r()*8|0},${30+r()*10|0},${8+r()*5|0})`;
    ctx.beginPath(); ctx.ellipse(sx,sy-th*0.38,tw*0.95,th*0.38,0,0,Math.PI*2); ctx.fill();
  }
}

// ── Building ───────────────────────────────────────────────────
function drawBld(o){
  const {sx,sy,sc}=proj(o.wx,o.wd,0);
  if(sx<-160||sx>W+160) return;
  const bw=W*o.bw*sc*(0.38+(1-o.wd)*0.62), bh=H*o.bh*sc*2.4;
  const bx=sx-bw/2, by=sy-bh;
  ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.ellipse(sx,sy,bw*0.58,5*sc,0,0,Math.PI*2); ctx.fill();
  const dc=Math.floor((1-o.wd)*28);
  const cr=Math.max(0,parseInt(o.col.slice(1,3),16)-dc);
  const cg=Math.max(0,parseInt(o.col.slice(3,5),16)-dc);
  const cb=Math.max(0,parseInt(o.col.slice(5,7),16)-dc);
  ctx.fillStyle=`rgb(${cr},${cg},${cb})`; ctx.strokeStyle='rgba(0,0,0,0.28)'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,1); ctx.fill(); ctx.stroke();
  // side face
  ctx.fillStyle=`rgb(${Math.max(0,cr-22)},${Math.max(0,cg-22)},${Math.max(0,cb-22)})`;
  ctx.beginPath(); ctx.moveTo(bx+bw,by); ctx.lineTo(bx+bw+bw*0.16,by-bh*0.1); ctx.lineTo(bx+bw+bw*0.16,sy-bh*0.1); ctx.lineTo(bx+bw,sy); ctx.closePath(); ctx.fill();
  // top face
  ctx.fillStyle=`rgb(${Math.min(255,cr+18)},${Math.min(255,cg+18)},${Math.min(255,cb+18)})`;
  ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+bw,by); ctx.lineTo(bx+bw+bw*0.16,by-bh*0.1); ctx.lineTo(bx+bw*0.16,by-bh*0.1); ctx.closePath(); ctx.fill();
  // windows
  const rows=o.fl||1, cols=Math.max(1,Math.floor(bw/13));
  const ww=Math.min(9,bw/cols*0.5), wh=ww*1.2;
  for(let rr=0;rr<rows;rr++) for(let cc=0;cc<cols;cc++){
    const wx2=bx+bw*0.1+(cc/cols)*bw*0.78, wy2=by+bh*0.12+(rr/rows)*bh*0.72;
    const lit=Math.sin(rr*17+cc*13+o.wx*100)>0;
    ctx.fillStyle=lit?'rgba(255,195,90,0.65)':'rgba(8,12,6,0.85)';
    ctx.beginPath(); ctx.roundRect(wx2,wy2,ww,wh,0.5); ctx.fill();
    if(lit){ ctx.globalAlpha=0.08; ctx.fillStyle='#ffcc44'; ctx.beginPath(); ctx.ellipse(wx2+ww/2,wy2+wh,ww*2,wh*2.2,0,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
  }
  // door
  ctx.fillStyle='rgba(8,6,4,0.92)'; ctx.beginPath(); ctx.roundRect(sx-3.5*sc,sy-13*sc,7*sc,13*sc,1); ctx.fill();
  if(o.dmg){
    ctx.fillStyle='rgba(28,18,8,0.65)';
    ctx.beginPath(); ctx.moveTo(bx+bw*0.55,by+bh*0.18); ctx.lineTo(bx+bw,by+bh*0.32); ctx.lineTo(bx+bw*0.72,by+bh); ctx.lineTo(bx+bw*0.55,by+bh); ctx.closePath(); ctx.fill();
  }
  if(o.mosque){
    const mx=bx+bw+bw*0.16+3, my2=by-bh*0.1, mw=bw*0.14, mh=bh*1.25;
    ctx.fillStyle=`rgb(${Math.min(255,cr+8)},${Math.min(255,cg+8)},${Math.min(255,cb+8)})`; ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.roundRect(mx,my2-mh,mw,mh,1); ctx.fill(); ctx.stroke();
    ctx.strokeStyle='#c8a030'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(mx+mw/2,my2-mh-5,5,0.8,Math.PI+0.3); ctx.stroke();
    ctx.fillStyle=`rgb(${Math.min(255,cr+14)},${Math.min(255,cg+14)},${Math.min(255,cb+14)})`;
    ctx.beginPath(); ctx.ellipse(sx,by,bw*0.33,bh*0.14,0,Math.PI,0); ctx.fill();
  }
}

// ── Tank (top-down 3/4 view from seeker) ──────────────────────
function drawTank(o){
  const {sx,sy,sc}=proj(o.wx,o.wd,0);
  if(sx<-110||sx>W+110) return;
  const s=sc*0.72;
  // camo net
  ctx.fillStyle='rgba(18,32,8,0.48)'; ctx.beginPath(); ctx.ellipse(sx,sy,58*s,22*s,o.ang,0,Math.PI*2); ctx.fill();
  ctx.save(); ctx.translate(sx,sy); ctx.rotate(o.ang); ctx.scale(s,s);
  const td=Math.floor((1-o.wd)*42);
  const sb=`rgb(${184-td},${168-td},${130-td})`,sm=`rgb(${150-td},${136-td},${104-td})`,sd=`rgb(${110-td},${98-td},${74-td})`,mk=`rgb(${78-td/2|0},${72-td/2|0},${60-td/2|0})`;
  ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.beginPath(); ctx.ellipse(0,5,66,20,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2e2c26'; ctx.beginPath(); ctx.roundRect(-60,-10,120,22,3); ctx.fill();
  ctx.strokeStyle='#3a3830'; ctx.lineWidth=1;
  for(let i=0;i<12;i++){ ctx.beginPath(); ctx.moveTo(-58+i*10,-10); ctx.lineTo(-58+i*10,12); ctx.stroke(); }
  ctx.fillStyle=sb; ctx.strokeStyle=sd; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.roundRect(-52,-16,104,20,3); ctx.fill(); ctx.stroke();
  ctx.fillStyle=sm; ctx.beginPath(); ctx.moveTo(-52,-16); ctx.lineTo(-36,-16); ctx.lineTo(-30,-24); ctx.lineTo(-52,-20); ctx.closePath(); ctx.fill();
  ctx.fillStyle=sb; ctx.strokeStyle=sd; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.ellipse(0,-14,27,20,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle=mk; ctx.strokeStyle=mk; ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.moveTo(-4,-14); ctx.lineTo(-4,-74); ctx.stroke();
  ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(4,-14); ctx.lineTo(4,-74); ctx.stroke();
  ctx.strokeStyle='#161614'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-6,-74); ctx.lineTo(6,-74); ctx.stroke();
  ctx.fillStyle=sm; ctx.beginPath(); ctx.arc(7,-20,7,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // tank target box
  ctx.strokeStyle='rgba(255,55,55,0.45)'; ctx.lineWidth=0.8; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.roundRect(-68,-80,136,90,2); ctx.stroke(); ctx.setLineDash([]);
  ctx.restore();
  // label
  ctx.fillStyle='rgba(255,60,60,0.75)'; ctx.font=`${Math.max(7,9*sc)}px "Orbitron",monospace`; ctx.textAlign='center';
  ctx.fillText('TANK',sx,sy-86*s); ctx.textAlign='left';
}

// ── Troop ──────────────────────────────────────────────────────
function drawTroop(o){
  const {sx,sy,sc}=proj(o.wx,o.wd,0);
  if(sx<-30||sx>W+30) return;
  const s=sc*0.88, bob=o.mov?Math.sin(T*0.12+o.ph)*1.5:0;
  const dc=Math.floor((1-o.wd)*14);
  ctx.fillStyle=`rgba(${18+dc},${28+dc},${12},0.88)`;
  ctx.beginPath(); ctx.ellipse(sx,sy-10*s+bob,4*s,7*s,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx,sy-19*s+bob,4.5*s,0,Math.PI*2); ctx.fill();
  if(o.mov){ const la=Math.sin(T*0.15+o.ph)*0.4; ctx.strokeStyle=`rgba(18,28,12,0.88)`; ctx.lineWidth=2.2*s; ctx.beginPath(); ctx.moveTo(sx,sy-3*s); ctx.lineTo(sx-3*s+la*6,sy+9*s); ctx.stroke(); ctx.beginPath(); ctx.moveTo(sx,sy-3*s); ctx.lineTo(sx+3*s-la*6,sy+9*s); ctx.stroke(); }
  else { ctx.fillStyle=`rgba(18,28,12,0.88)`; ctx.beginPath(); ctx.roundRect(sx-4*s,sy-3*s,8*s,11*s,1); ctx.fill(); }
  ctx.strokeStyle='rgba(8,12,6,0.8)'; ctx.lineWidth=1.5*s; ctx.beginPath(); ctx.moveTo(sx-3*s,sy-14*s+bob); ctx.lineTo(sx-11*s,sy-10*s+bob); ctx.stroke();
}

// ── Vehicle ────────────────────────────────────────────────────
function drawVeh(o){
  const {sx,sy,sc}=proj(o.wx,o.wd,0);
  if(sx<-90||sx>W+90) return;
  const s=sc*0.78;
  ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.beginPath(); ctx.ellipse(sx,sy,30*s,9*s,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=o.col; ctx.strokeStyle='rgba(0,0,0,0.38)'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.roundRect(sx-27*s,sy-15*s,54*s,15*s,2); ctx.fill(); ctx.stroke();
  ctx.fillStyle=o.col; ctx.beginPath(); ctx.roundRect(sx-10*s,sy-26*s,30*s,11*s,2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(18,28,38,0.75)'; ctx.beginPath(); ctx.roundRect(sx-7*s,sy-24*s,26*s,8*s,1); ctx.fill();
  [-19,-5,11,21].forEach(wx=>{ ctx.fillStyle='#181812'; ctx.beginPath(); ctx.arc(sx+wx*s,sy,5.5*s,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#222820'; ctx.beginPath(); ctx.arc(sx+wx*s,sy,3*s,0,Math.PI*2); ctx.fill(); });
}

// ── Crosshair ──────────────────────────────────────────────────
function drawXhair(){
  const cx=mx,cy=my,pu=0.62+Math.sin(T*0.1)*0.2;
  ctx.strokeStyle=`rgba(57,255,20,${pu})`; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(cx,cy,30,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle=`rgba(57,255,20,${pu*0.5})`; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.arc(cx,cy,18,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle=`rgba(57,255,20,${pu})`; ctx.lineWidth=1.1;
  const gap=7,len=15;
  [[cx-gap-len,cy,cx-gap,cy],[cx+gap,cy,cx+gap+len,cy],[cx,cy-gap-len,cx,cy-gap],[cx,cy+gap,cx,cy+gap+len]].forEach(([ax,ay,bx,by2])=>{ ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by2); ctx.stroke(); });
  for(let t=0;t<8;t++){ const a=(t/8)*Math.PI*2,r1=30,r2=36; ctx.beginPath(); ctx.moveTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1); ctx.lineTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2); ctx.stroke(); }
  ctx.fillStyle=`rgba(57,255,20,${pu})`; ctx.beginPath(); ctx.arc(cx,cy,2.5,0,Math.PI*2); ctx.fill();
}

function updateHUD(){
  const alt=Math.max(0,Math.round(820-lp*650));
  document.getElementById('halt').textContent=alt;
  document.getElementById('hspd').textContent=315+Math.floor(Math.sin(T*0.05)*18);
  document.getElementById('hrng').textContent=Math.max(0,Math.round(4400-lp*4200));
  document.getElementById('hsc').textContent=score;
  const alive=objs.filter(o=>o.type==='tank'&&o.alive);
  document.getElementById('htgt').textContent=alive.length>0?`${alive.length} ACTIVE`:'ALL DESTROYED';
}

// ── Explosion class ────────────────────────────────────────────
class Explosion{
  constructor(sx,sy,sc){
    this.sx=sx;this.sy=sy;this.sc=sc||1;this.fr=0;this.maxFr=58;this.alive=true;
    for(let i=0;i<42;i++){
      const a=Math.random()*Math.PI*2,sp=(1+Math.random()*9)*this.sc;
      parts.push({x:sx,y:sy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp*0.55-1.2,life:1,dc:0.014+Math.random()*0.018,sz:(3+Math.random()*8)*this.sc,col:['#ff5500','#ff8800','#ffcc00','#fff','#aaa'][Math.floor(Math.random()*5)]});
    }
    shake=9*this.sc; hfl=1;
  }
  update(){this.fr++;if(this.fr>this.maxFr)this.alive=false;}
  draw(){
    const p=this.fr/this.maxFr,r1=100*p*this.sc;
    const g=ctx.createRadialGradient(this.sx,this.sy,0,this.sx,this.sy,r1);
    g.addColorStop(0,`rgba(255,230,60,${(1-p)*0.92})`);
    g.addColorStop(0.3,`rgba(255,90,10,${(1-p)*0.7})`);
    g.addColorStop(0.7,`rgba(180,60,0,${(1-p)*0.3})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(this.sx,this.sy,Math.max(1,r1),0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    if(p>0.08){ctx.beginPath();ctx.arc(this.sx,this.sy,r1*0.72,0,Math.PI*2);ctx.strokeStyle=`rgba(55,45,35,${(1-p)*0.4})`;ctx.lineWidth=14*this.sc*(1-p);ctx.stroke();}
    if(p<0.4){ctx.beginPath();ctx.arc(this.sx,this.sy,42*Math.sin(p*Math.PI)*this.sc,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,220,${(1-p*2.5)*0.88})`;ctx.fill();}
  }
}

// ── Hit detection ──────────────────────────────────────────────
function checkHit(cx,cy){
  if(phase!=='seeker') return;
  let hit=false;
  objs.forEach(o=>{
    if(o.type!=='tank'||!o.alive) return;
    const {sx,sy,sc}=proj(o.wx,o.wd,0);
    if(Math.sqrt((cx-sx)**2+(cy-sy)**2)<68*sc){
      o.alive=false; hit=true;
      exps.push(new Explosion(sx,sy,sc));
      score+=500; flashMsg('TARGET DESTROYED');
      setTimeout(()=>{o.alive=true;o.wx=-0.9+Math.random()*1.8;o.wd=0.72+Math.random()*0.22;},9000);
    }
  });
  if(!hit) exps.push(new Explosion(cx,cy,0.38));
}

cv.addEventListener('click',e=>{if(phase==='seeker') checkHit(e.clientX,e.clientY);});
cv.addEventListener('touchend',e=>{if(phase==='seeker'){const t=e.changedTouches[0];checkHit(t.clientX,t.clientY);}});

function flashMsg(txt){const el=document.getElementById('pmsg');el.textContent=txt;el.classList.remove('fl');void el.offsetWidth;el.classList.add('fl');}

// ── Launch ─────────────────────────────────────────────────────
function launch(){
  if(phase!=='pad') return;
  const btn=document.getElementById('lbtn');
  const br=btn.getBoundingClientRect();
  phase='launch'; lp=0;
  btn.classList.add('fire');
  for(let r=0;r<4;r++) setTimeout(()=>{
    const ring=document.createElement('div');ring.className='lring';
    ring.style.cssText=`left:${br.left+br.width/2}px;top:${br.top+br.height/2}px;width:${br.width}px;height:${br.height}px;`;
    document.body.appendChild(ring);setTimeout(()=>ring.remove(),600);
  },r*95);
  shake=14; setTimeout(()=>{btn.classList.add('gone');flashMsg('MISSILE AWAY');},320);
  setTimeout(()=>{
    phase='seeker';
    document.getElementById('shud').classList.add('on');
    document.getElementById('nv-tint').classList.add('on');
    flashMsg('SEEKER ACTIVE — GUIDE TO TARGET');
  },2800);
}

// ── Main loop ──────────────────────────────────────────────────
mx=W/2; my=H/2;
function loop(){
  T++;
  let sx2=0,sy2=0;
  if(shake>0){sx2=(Math.random()-0.5)*shake;sy2=(Math.random()-0.5)*shake;shake*=0.82;if(shake<0.25)shake=0;}
  ctx.save(); if(shake>0) ctx.translate(sx2,sy2);
  ctx.clearRect(-20,-20,W+40,H+40);
  if(phase==='pad') drawPad();
  else if(phase==='launch'){lp+=0.013;drawLaunch();}
  else if(phase==='seeker'){lp=Math.min(1,lp+0.0018);drawSeeker();}
  if(hfl>0){ctx.fillStyle=`rgba(255,210,50,${hfl*0.14})`;ctx.fillRect(-20,-20,W+40,H+40);hfl*=0.78;if(hfl<0.02)hfl=0;}
  ctx.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
