<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dababati</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #39ff14;
    --green-dim: #1a7a00;
    --green-glow: rgba(57, 255, 20, 0.4);
    --amber: #ffb300;
    --red: #ff2a2a;
    --bg: #050a03;
    --panel: #0b1409;
    --panel2: #0d1a0a;
    --border: #1e3d0f;
    --border2: #274d16;
    --text: #c8f5b0;
    --text-dim: #6aaa50;
    --text-muted: #2e6020;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Share Tech Mono',monospace;
    min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:40px 16px 80px;
    overflow-x:hidden; position:relative; }
  body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px); pointer-events:none; z-index:100; }
  body::after { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(57,255,20,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(57,255,20,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }

  .container { position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; gap:40px; width:100%; max-width:860px; }

  h1 { font-family:'Orbitron',monospace; font-weight:900; font-size:clamp(2rem,6vw,4rem); letter-spacing:0.3em; text-transform:uppercase; color:var(--green); text-shadow:0 0 10px var(--green),0 0 30px var(--green-glow),0 0 60px rgba(57,255,20,0.2); animation:flicker 8s infinite; }
  @keyframes flicker { 0%,95%,100%{opacity:1}96%{opacity:0.85}97%{opacity:1}98%{opacity:0.7}99%{opacity:1} }

  /* ── Meter Panel ── */
  .meter-panel { background:var(--panel); border:2px solid var(--border); border-radius:4px; padding:32px 48px; position:relative; box-shadow:0 0 0 1px rgba(57,255,20,0.1),0 0 30px rgba(57,255,20,0.05),inset 0 0 40px rgba(0,0,0,0.5); min-width:min(420px,100%); width:100%; max-width:460px; }
  .meter-label { font-family:'Orbitron',monospace; font-size:0.6rem; letter-spacing:0.3em; color:var(--green-dim); text-align:center; margin-bottom:16px; }
  .counter-display { font-family:'Orbitron',monospace; font-size:clamp(3rem,10vw,6rem); font-weight:700; color:var(--green); text-align:center; letter-spacing:0.1em; text-shadow:0 0 10px var(--green),0 0 25px var(--green-glow); cursor:default; user-select:none; min-width:6ch; display:block; transition:color 0.3s; }
  .counter-display.warning{color:var(--amber);text-shadow:0 0 10px var(--amber),0 0 25px rgba(255,179,0,0.4);}
  .counter-display.danger{color:var(--red);text-shadow:0 0 10px var(--red),0 0 25px rgba(255,42,42,0.4);}
  .bar-container{margin-top:20px;width:100%;height:16px;background:rgba(57,255,20,0.08);border:1px solid var(--border);border-radius:2px;overflow:hidden;}
  .bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--green-dim),var(--green));transition:width 0.3s ease,background 0.3s;border-radius:2px;position:relative;}
  .bar-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:4px;background:white;opacity:0.6;filter:blur(2px);}
  .bar-fill.warning{background:linear-gradient(90deg,#7a4400,var(--amber));}
  .bar-fill.danger{background:linear-gradient(90deg,#7a0000,var(--red));}
  .ticks{display:flex;justify-content:space-between;margin-top:4px;padding:0 2px;}
  .tick{font-size:0.55rem;color:var(--green-dim);}
  
  /* ── Controls area ── */
  .controls-area { margin-top:24px; display:flex; flex-direction:column; align-items:center; gap:12px; }
  .controls { display:flex; gap:16px; justify-content:center; }
  .btn { font-family:'Orbitron',monospace; font-size:1.4rem; font-weight:700; width:56px; height:56px; background:transparent; border:2px solid var(--green-dim); color:var(--green); border-radius:4px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; }
  .btn:hover:not(:disabled){background:rgba(57,255,20,0.1);border-color:var(--green);box-shadow:0 0 12px var(--green-glow);transform:translateY(-1px);}
  .btn:active:not(:disabled){transform:translateY(1px);box-shadow:none;}
  .btn:disabled{opacity:0.25;cursor:not-allowed;border-color:#0d1e08;color:#1a4a0a;}
  .btn-reset{font-size:0.55rem;letter-spacing:0.15em;width:auto;padding:0 18px;color:var(--green-dim);border-color:#152a09;}
  .btn-reset:hover:not(:disabled){color:var(--green);border-color:var(--green-dim);box-shadow:none;}
  .status-line{font-size:0.6rem;letter-spacing:0.2em;color:var(--green-dim);text-align:center;height:1em;}

  /* ── PIN lock zone ── */
  .lock-zone { display:flex; flex-direction:column; align-items:center; gap:8px; width:100%; }
  .lock-status { display:flex; align-items:center; gap:8px; font-size:0.55rem; letter-spacing:0.18em; color:var(--text-muted); }
  .lock-icon { font-size:0.9rem; }
  .lock-status.unlocked { color:var(--green-dim); }

  .pin-dots { display:flex; gap:8px; justify-content:center; }
  .pin-dot { width:10px; height:10px; border-radius:50%; border:1px solid var(--green-dim); background:transparent; transition:background 0.15s, border-color 0.15s; }
  .pin-dot.filled { background:var(--green); border-color:var(--green); box-shadow:0 0 6px var(--green-glow); }
  .pin-dot.error  { background:var(--red); border-color:var(--red); }

  .pin-keypad { display:grid; grid-template-columns:repeat(3,44px); gap:6px; margin-top:4px; }
  .pin-key { font-family:'Orbitron',monospace; font-size:0.75rem; font-weight:700; width:44px; height:36px; background:transparent; border:1px solid var(--border2); color:var(--text-dim); border-radius:3px; cursor:pointer; transition:all 0.12s; display:flex; align-items:center; justify-content:center; }
  .pin-key:hover{background:rgba(57,255,20,0.07);border-color:var(--green-dim);color:var(--green);}
  .pin-key:active{transform:scale(0.93);}
  .pin-key.wide{grid-column:span 2;}
  .pin-key.del{color:var(--red);border-color:#3a0f0f;}
  .pin-key.del:hover{background:rgba(255,42,42,0.08);border-color:var(--red);}
  .unlock-timer{font-size:0.48rem;letter-spacing:0.15em;color:var(--text-muted);}

  /* ── COMMENTS ── */
  .comments-section{width:100%;background:var(--panel);border:2px solid var(--border);border-radius:4px;overflow:hidden;position:relative;box-shadow:0 0 0 1px rgba(57,255,20,0.08),0 0 30px rgba(57,255,20,0.04);}
  .comments-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:rgba(57,255,20,0.03);}
  .comments-title{font-family:'Orbitron',monospace;font-size:0.65rem;letter-spacing:0.3em;color:var(--green);}
  .comments-meta{font-size:0.55rem;letter-spacing:0.15em;color:var(--text-muted);}
  .expiry-badge{font-size:0.5rem;letter-spacing:0.1em;color:var(--amber);background:rgba(255,179,0,0.08);border:1px solid rgba(255,179,0,0.2);border-radius:2px;padding:2px 8px;}

  .comments-feed{max-height:480px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;scrollbar-color:var(--green-dim) transparent;}
  .comments-feed::-webkit-scrollbar{width:4px}
  .comments-feed::-webkit-scrollbar-track{background:transparent}
  .comments-feed::-webkit-scrollbar-thumb{background:var(--green-dim);border-radius:2px}

  .comment-empty{text-align:center;padding:40px 0;color:var(--text-muted);font-size:0.65rem;letter-spacing:0.2em;}
  .comment-card{background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:14px 16px 10px;transition:border-color 0.2s;cursor:pointer;}
  .comment-card.selected{border-color:var(--red);}

  /* shake animation for wrong pin */
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  .shake{animation:shake 0.4s ease;}
</style>
</head>
<body>
<div class="container">
  <h1>Dababati</h1>

  <div class="meter-panel">
    <div class="meter-label">// UNIT COUNTER — ACTIVE //</div>
    <span class="counter-display" id="counter">---</span>
    <div class="bar-container"><div class="bar-fill" id="bar"></div></div>
    <div class="ticks">
      <span class="tick">0</span><span class="tick">250</span>
      <span class="tick">500</span><span class="tick">750</span><span class="tick">999</span>
    </div>

    <div class="controls-area">
      <div class="controls">
        <button class="btn" id="btn-dec" onclick="change(-1)" disabled>−</button>
        <button class="btn" id="btn-inc" onclick="change(1)"  disabled>+</button>
        <button class="btn btn-reset" onclick="tryReset()"  disabled id="btn-rst">RESET</button>
        <button class="btn btn-reset" onclick="doLock()"  disabled id="btn-lck">Lock</button>
      </div>

      <div class="lock-zone" id="lock-zone">
        <div class="lock-status" id="lock-status">
          <span class="lock-icon">🔒</span>
          <span id="lock-label">ENTER PIN TO UNLOCK</span>
        </div>

        <div class="pin-dots" id="pin-dots">
          <div class="pin-dot" id="d0"></div>
          <div class="pin-dot" id="d1"></div>
          <div class="pin-dot" id="d2"></div>
          <div class="pin-dot" id="d3"></div>
        </div>

        <div class="pin-keypad" id="pin-keypad">
          <button class="pin-key" onclick="pinKey('1')">1</button>
          <button class="pin-key" onclick="pinKey('2')">2</button>
          <button class="pin-key" onclick="pinKey('3')">3</button>
          <button class="pin-key" onclick="pinKey('4')">4</button>
          <button class="pin-key" onclick="pinKey('5')">5</button>
          <button class="pin-key" onclick="pinKey('6')">6</button>
          <button class="pin-key" onclick="pinKey('7')">7</button>
          <button class="pin-key" onclick="pinKey('8')">8</button>
          <button class="pin-key" onclick="pinKey('9')">9</button>
          <button class="pin-key wide" onclick="pinKey('0')">0</button>
          <button class="pin-key del" onclick="pinDel()">⌫</button>
        </div>

        <div class="unlock-timer" id="unlock-timer"></div>
      </div>

      <div class="status-line" id="status">STANDBY</div>
    </div>
  </div>

  <!-- ── COMMENT SECTION ── -->
  <div class="comments-section">
    <div class="comments-header">
      <span class="comments-title">// FIELD COMMS — LIVE FEED //</span>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <span class="expiry-badge" id="expiry-badge">AUTO-CLEAR IN 3D</span>
        <span class="comments-meta" id="signal-count">0 SIGNALS</span>
      </div>
    </div>
    <div class="comments-feed" id="feed">
      <div class="comment-empty pulse" id="empty-state">// NO TRANSMISSIONS — BE THE FIRST //</div>
      <!-- Example comment -->
      <div class="comment-card" id="comment-1" onclick="selectComment('comment-1')">
        <div class="comment-body">Alpha unit reporting in.</div>
      </div>
      <div class="comment-card" id="comment-2" onclick="selectComment('comment-2')">
        <div class="comment-body">Bravo squad on standby.</div>
      </div>
    </div>
  </div>
</div>

<script>
let enteredPin = "";
let selectedCommentId = null;
const MASTER_DELETE_PIN = "4721";

function pinKey(digit) {
  if(enteredPin.length>=4) return;
  enteredPin += digit;
  updateDots();
  if(enteredPin.length===4) checkPin();
}

function pinDel() {
  enteredPin = enteredPin.slice(0,-1);
  updateDots();
}

function updateDots() {
  for(let i=0;i<4;i++){
    const dot=document.getElementById('d'+i);
    dot.classList.toggle('filled',i<enteredPin.length);
  }
}

function selectComment(commentId) {
  if(selectedCommentId){
    const prev = document.getElementById(selectedCommentId);
    if(prev) prev.classList.remove('selected');
  }
  selectedCommentId = commentId;
  const el = document.getElementById(commentId);
  if(el) el.classList.add('selected');
}

function checkPin() {
  if(enteredPin===MASTER_DELETE_PIN){
    if(selectedCommentId){
      const comment=document.getElementById(selectedCommentId);
      if(comment) comment.remove();
      selectedCommentId = null;
    }
    enteredPin="";
    updateDots();
    return;
  }
  // normal unlock logic
  document.getElementById('status').innerText="PIN INCORRECT";
  document.getElementById('lock-zone').classList.add('shake');
  setTimeout(()=>document.getElementById('lock-zone').classList.remove('shake'),400);
  enteredPin="";
  updateDots();
}
</script>
</body>
</html>
